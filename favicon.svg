<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#06d6d0"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#080811"/>
  <!-- Border glow -->
  <rect width="100" height="100" rx="22" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.5"/>
  <!-- Circuit corner dots -->
  <circle cx="16" cy="16" r="3.5" fill="#6c63ff" opacity="0.8"/>
  <circle cx="84" cy="16" r="3.5" fill="#06d6d0" opacity="0.8"/>
  <circle cx="16" cy="84" r="3.5" fill="#06d6d0" opacity="0.8"/>
  <circle cx="84" cy="84" r="3.5" fill="#a855f7" opacity="0.8"/>
  <!-- Circuit traces -->
  <line x1="19.5" y1="16" x2="80.5" y2="16" stroke="#6c63ff" stroke-width="1" opacity="0.25"/>
  <line x1="16" y1="19.5" x2="16" y2="80.5" stroke="#06d6d0" stroke-width="1" opacity="0.25"/>
  <line x1="19.5" y1="84" x2="80.5" y2="84" stroke="#a855f7" stroke-width="1" opacity="0.25"/>
  <line x1="84" y1="19.5" x2="84" y2="80.5" stroke="#06d6d0" stroke-width="1" opacity="0.25"/>
  <!-- FF letters with gradient -->
  <text x="50" y="67" font-family="Arial Black, Arial, sans-serif" font-size="50" font-weight="900" fill="url(#g)" text-anchor="middle" letter-spacing="-3">FF</text>
  <!-- Underline accent -->
  <rect x="28" y="72" width="44" height="2.5" rx="1.5" fill="url(#g2)" opacity="0.7"/>
</svg>
